services:
    db:
        image: postgres:latest
        ports:
        - "5432:5432"
        command: [ "postgres", "-c", "log_statement=all", "-c", "log_destination=stderr" ]
        healthcheck:
            test: [ "CMD", "pg_isready", "-U", "postgres", "-d", "postgres" ]
            interval: 1s
            retries: 20
        environment:
            POSTGRES_DB: ${DB_NAME}
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASS}
        volumes:
        - database-data:/var/lib/postgresql/data
    
    redis:
        image: redis:7-alpine
        container_name: redis
        ports:
            - "6380:6379"
        command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
        healthcheck:
            test: [ "CMD", "redis-cli", "ping" ]
            interval: 5s
            timeout: 3s
            retries: 5
        volumes:
            - redis-data:/data
        restart: unless-stopped

    migrations:
        image: ghcr.io/kukymbr/goose-docker:3.24.2
        restart: no
        depends_on:
            db:
                condition: service_healthy
        environment:
        - GOOSE_DRIVER=postgres
        - GOOSE_DBSTRING=host=${DB_HOST} port=${DB_PORT} user=${DB_USER} password=${DB_PASS} dbname=${DB_NAME}
        - GOOSE_VERBOSE=true
        - GOOSE_COMMAND=${GOOSE_COMMAND}
        - GOOSE_COMMAND_ARG=${GOOSE_COMMAND_ARG}
        volumes:
        - ./migrations:/migrations

    auth-service:
        build:
            context: ./backend/auth_service
        container_name: auth-service
        depends_on:
            migrations:
                condition: service_completed_successfully
            rabbitmq:
                condition: service_healthy
            redis:
                condition: service_healthy
        environment:
            CONFIG_PATH: /app/config/config.yml
        restart: unless-stopped
    


    
    core-service:
        build:
            context: ./backend/core_service
        container_name: core-service
        depends_on:
            migrations:
                condition: service_completed_successfully
            rabbitmq:
                condition: service_healthy
            redis:
                condition: service_healthy
        environment:
            CONFIG_PATH: /app/config/config.yml
        restart: unless-stopped
    
    notifcation-service:
        build:
            context: ./backend/notification_service
        container_name: notifcation-service
        depends_on:
            migrations:
                condition: service_completed_successfully
            rabbitmq:
                condition: service_healthy
        environment:
            CONFIG_PATH: /app/config/config.yml
        restart: unless-stopped

    booking-service-1:
        build:
            context: ./backend/booking_service
        container_name: booking-service-1
        depends_on:
            migrations:
                condition: service_completed_successfully
            rabbitmq:
                condition: service_healthy
            redis:
                condition: service_healthy
        environment:
            CONFIG_PATH: /app/config/config.yml
        restart: unless-stopped

    booking-service-2:
        build:
            context: ./backend/booking_service
        container_name: booking-service-2
        depends_on:
            migrations:
                condition: service_completed_successfully
            rabbitmq:
                condition: service_healthy
            redis:
                condition: service_healthy
        environment:
            CONFIG_PATH: /app/config/config.yml

        restart: unless-stopped

    nginx:
        image: nginx:alpine
        container_name: nginx
        ports:
            - "81:80"
            - "443:443"
        volumes:
            - ./nginx/conf.d:/etc/nginx/conf.d:ro
            - ./frontend/dist:/usr/share/nginx/html:ro
        depends_on:
            - auth-service
            - core-service
            - booking-service-1
            - booking-service-2
        restart: unless-stopped

    prometheus:
        image: prom/prometheus:latest
        container_name: prometheus
        ports:
            - "9090:9090"
        volumes:
            - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
            - prometheus-data:/prometheus
        command:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--web.console.libraries=/etc/prometheus/console_libraries'
            - '--web.console.templates=/etc/prometheus/consoles'
            - '--web.enable-lifecycle'
        restart: unless-stopped
    
    grafana:
        image: grafana/grafana:latest
        container_name: grafana
        ports:
            - "3000:3000"
        environment:
            - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
            - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
            - GF_INSTALL_PLUGINS=grafana-piechart-panel
        volumes:
            - grafana-data:/var/lib/grafana
            - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
            - ./grafana/datasources:/etc/grafana/provisioning/datasources
        depends_on:
            - prometheus
        restart: unless-stopped


    rabbitmq:
        image: rabbitmq:3.13.7-management
        ports:
            - "5672:5672"
            - "15672:15672"
        healthcheck:
            test: rabbitmq-diagnostics -q ping
            interval: 30s
            timeout: 30s
            retries: 3

    
volumes:
    database-data:
    redis-data:
    prometheus-data:
    grafana-data: