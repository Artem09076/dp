global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'booking-service'
    static_configs:
      - targets: ['booking-service:8081']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'core-service'
    static_configs:
      - targets: ['core-service:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s
  
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:8084']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']