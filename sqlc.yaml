version: "2"

sql:
  - engine: "postgresql"
    schema: "./migrations"
    queries: "./queries/auth"
    gen:
      go:
        package: "sqlc"
        out: "backend/auth_service/internal/storage/db"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true

  - engine: "postgresql"
    schema: "./migrations"
    queries: "./queries/core"
    gen:
      go:
        package: "sqlc"
        out: "backend/core_service/internal/storage/db"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        overrides:
          - db_type: "BLOB"
            go_type:  
              type: "[]byte"

  - engine: "postgresql"
    schema: "./migrations"
    queries: "./queries/booking"
    gen:
      go:
        package: "sqlc"
        out: "backend/booking_service/internal/storage/db"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        overrides:
          - db_type: "BLOB"
            go_type:  
              type: "[]byte"
      