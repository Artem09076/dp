upstream auth_service {
    least_conn;
    server auth-service:8084;
    keepalive 32;
}

upstream core_service {
    least_conn;
    server core-service:8080;
    keepalive 32;
}

upstream booking_service {
    least_conn;
    server booking-service-1:8081 weight=1 max_fails=3 fail_timeout=30s;
    server booking-service-2:8081 weight=1 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 80;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;
    
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    client_max_body_size 10M;
    
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;  
    
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    location /api/v1/register {
        proxy_pass http://auth_service/api/v1/register;
        proxy_pass_request_body on;
        proxy_set_header Content-Type $content_type;
    }
    
    location /api/v1/login {
        proxy_pass http://auth_service/api/v1/login;
        proxy_pass_request_body on;
        proxy_set_header Content-Type $content_type;
    }
    
    location /api/v1/refresh {
        proxy_pass http://auth_service/api/v1/refresh;
        
        proxy_set_header Authorization $http_authorization;
    }
    
    location /api/v1/logout {
        proxy_pass http://auth_service/api/v1/logout;
        proxy_set_header Authorization $http_authorization;
    }
    
    location /api/v1/bookings {
        proxy_pass http://booking_service/api/v1/bookings;
        proxy_pass_request_body on;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
    
    location /api/v1/ {
        proxy_pass http://core_service/api/v1/;
        proxy_pass_request_body on;
    }
    
    location / {
        try_files $uri $uri/ /index.html;
        
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
        add_header Cache-Control "no-cache";
    }
    
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}